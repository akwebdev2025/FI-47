<body>
<!-- LOGIN SCREEN -->
<div id="login-container">
  <h2>Login to Continue</h2>
  <input type="text" id="login-id" placeholder="Enter ID"><br>
  <input type="password" id="login-pass" placeholder="Enter Password"><br>
  <button onclick="verifyLogin()">Login</button>
</div>

<!-- MAIN APP (hidden initially) -->
<div id="main-content" style="display: none;">
  <!-- Your tracker or study app goes here -->
  
  <!-- Add your existing tracker code here -->
</div>
<header>
  <span class="hamburger" onclick="toggleDrawer()">&#9776;</span>
  Study Tracker
</header>

<aside class="drawer" id="drawer">
  <span class="close" onclick="toggleDrawer()">&times;</span>
  <h3>Student Profile</h3>
  <p>Name: Akash</p>
  <p>Class: 12th A2</p>
  <hr />
  <label><input type="checkbox" onchange="toggleDarkMode(this.checked)"> Dark Mode</label>
<hr />
<button class="btn" onclick="resetProgress()">Reset Progress</button>

</aside>

<main class="container">
  <section id="subjectSelect">
    <h2>Select Subject</h2>
    <button class="btn" onclick="loadSubject('Maths')">Maths</button>
    <button class="btn" onclick="loadSubject('Geography')">Geography</button>
    <button class="btn" onclick="loadSubject('History')">History</button>
    <button class="btn" onclick="loadSubject('Political Science')">Political Science</button>
    <button class="btn" onclick="loadSubject('English')">English</button>
    
  </section>

  <section id="chapterList" class="hidden">
    <h2 id="subjectTitle"></h2>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-label" id="progressPercent">0%</div>

    <div id="chapters"></div>
    <button class="btn" onclick="goBackToMenu()">Back to Menu</button>
  </section>

  <section id="graphSection" class="hidden">
    <div class="chart-container">
      <canvas id="consistencyChart" height="400" ></canvas>
    </div>
    <div id="topicDetails" class="topic-list hidden"></div>
    <button class="btn" onclick="goBack()">Back</button>
  </section>
</main>

<script src="script.js"></script>
</body>

  --primary: #6c2bd9;
  --background-light: #f6f6f6;
  --background-dark: #1e1e1e;
  --text-light: #333;
  --text-dark: #f0f0f0;
}

body {
  font-family: 'Arial', sans-serif;
  margin: 0;
  background: var(--background-light);
  color: var(--text-light);
  transition: background 0.3s, color 0.3s;
}

body.dark-mode {
  background: var(--background-dark);
  color: var(--text-dark);
}

header {
  background: var(--primary);
  color: white;
  padding: 1rem;
  text-align: center;
  font-size: 1.8rem;
  position: relative;
}

.hamburger {
  position: absolute;
  left: 1rem;
  top: 1rem;
  font-size: 1.5rem;
  cursor: pointer;
}

.drawer {
  position: fixed;
  top: 0;
  left: -100%;
  width: 250px;
  height: 100%;
  background: var(--background-light);
  box-shadow: 2px 0 5px rgba(0,0,0,0.3);
  transition: left 0.3s;
  padding: 1rem;
  z-index: 10;
}

.drawer.dark-mode {
  background: var(--background-dark);
}

.drawer.open {
  left: 0;
}

.drawer .close {
  font-size: 1.2rem;
  cursor: pointer;
  float: right;
}

.container {
  padding: 1rem;
}

.btn {
  background: var(--primary);
  color: white;
  padding: 0.8rem;
  margin: 0.5rem 0;
  width: 100%;
  border: none;
  font-size: 1.2rem;
  border-radius: 8px;
  cursor: pointer;
}

.hidden {
  display: none;
}

.chapter {
  background: white;
  margin: 1rem 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 0.5rem;
}

body.dark-mode .chapter {
  background: #2c2c2c;
  color: var(--text-dark);
}

.topics {
  background: #eee;
  padding-left: 1rem;
  color: var(--text-light);
}

body.dark-mode .topics {
  background: #333;
  color: var(--text-dark);
}

.topic-list {
  background: #fff;
  padding: 1rem;
  margin-top: 1rem;
  border-radius: 8px;
}

body.dark-mode .topic-list {
  background: #2c2c2c;
  color: var(--text-dark);
}

canvas {
  min-width: 600px;
}

.chart-container {
  overflow-x: auto;
}

.progress-container {
  width: 100%;
  background-color: #ddd;
  border-radius: 20px;
  margin: 10px 0;
  height: 25px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background-color: var(--primary);
  border-radius: 20px;
  transition: width 0.3s;
}

.progress-label {
  text-align: right;
  font-weight: bold;
}

let selectedSubject = '';
let studyLog = JSON.parse(localStorage.getItem('studyLog')) || {};
let chartInstance;

function saveStudyLog() {
  localStorage.setItem('studyLog', JSON.stringify(studyLog));
}

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
}

function toggleDarkMode(isDark) {
  document.body.classList.toggle('dark-mode', isDark);
  document.getElementById('drawer').classList.toggle('dark-mode', isDark);
}

function loadSubject(subject) {
  selectedSubject = subject;
  document.getElementById('subjectSelect').classList.add('hidden');
  document.getElementById('chapterList').classList.remove('hidden');
  document.getElementById('subjectTitle').textContent = subject;

  const chapterData = subjects[subject];
  const container = document.getElementById('chapters');
  container.innerHTML = '';

  chapterData.forEach((ch, chapterIndex) => {
    const div = document.createElement('div');
    div.classList.add('chapter');

    let topicsHtml = '';
    ch.topics.forEach((t, topicIndex) => {
      if (typeof t === 'string') {
        const topicKey = `[${subject}] ${t}`;
        const isChecked = Object.values(studyLog).some(day => day.includes(topicKey));
        topicsHtml += `<div><input type="checkbox" onchange="markTopic('${t}', this.checked)" ${isChecked ? 'checked' : ''}> ${t}</div>`;
      } else {
        topicsHtml += `<div><strong>${t.name}</strong></div>`;
        t.subtopics.forEach((sub, subIndex) => {
          const topicKey = `[${subject}] ${t.name} - ${sub}`;
          const isChecked = Object.values(studyLog).some(day => day.includes(topicKey));
          topicsHtml += `<div style="margin-left: 20px;">
            <input type="checkbox" onchange="markTopic('${t.name} - ${sub}', this.checked)" ${isChecked ? 'checked' : ''}>
            ${sub}
          </div>`;
        });
      }
    });

    div.innerHTML = `<strong>${ch.title}</strong> 
      <button onclick="toggleTopics(${chapterIndex})">Topics</button>
      <div class="topics hidden">${topicsHtml}</div>`;

    container.appendChild(div);
  });

  updateProgress();
}

function toggleTopics(index) {
  const topicDivs = document.querySelectorAll('.topics');
  topicDivs[index].classList.toggle('hidden');
}

function markTopic(topic, checked) {
  const date = new Date().toISOString().split('T')[0];
  if (!studyLog[date]) studyLog[date] = [];
  const topicKey = `[${selectedSubject}] ${topic}`;
  if (checked) {
    if (!studyLog[date].includes(topicKey)) {
      studyLog[date].push(topicKey);
    }
  } else {
    studyLog[date] = studyLog[date].filter(t => t !== topicKey);
  }
  saveStudyLog();
  updateProgress();
}

function updateProgress() {
  const allCheckboxes = document.querySelectorAll('#chapters input[type="checkbox"]');
  const checked = Array.from(allCheckboxes).filter(cb => cb.checked).length;
  const total = allCheckboxes.length;
  const percent = total === 0 ? 0 : Math.round((checked / total) * 100);

  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('progressBar').style.width = percent + '%';
}

function showGraph() {
  document.getElementById('subjectSelect').classList.add('hidden');
  document.getElementById('chapterList').classList.add('hidden');
  document.getElementById('graphSection').classList.remove('hidden');

  const ctx = document.getElementById('consistencyChart').getContext('2d');
  const dates = getDateRange('2025-04-11', '2026-04-18');
  const data = dates.map(date => studyLog[date]?.length || 0);

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{
        label: 'No. of Topics',
        data,
        fill: false,
        borderColor: '#6c2bd9',
        tension: 0.3,
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      onClick: (e, el) => {
        const index = el[1]?.index;
        if (index !== undefined) showTopicDetails(dates[index]);
      },
      scales: {
        y: {
          beginAtZero: true,
          title: { display: true, text: 'No. of Topics' }
        },
        x: {
          ticks: {
            maxRotation: 60,
            minRotation: 60
          }
        }
      }
    }
  });
}

function getDateRange(start, end) {
  const result = [];
  let date = new Date(start);
  const endDate = new Date(end);
  while (date <= endDate) {
    result.push(date.toISOString().split('T')[0]);
    date.setDate(date.getDate() + 1);
  }
  return result;
}

function showTopicDetails(date) {
  const topics = studyLog[date] || [];
  const container = document.getElementById('topicDetails');
  container.innerHTML = `<strong>${date}</strong><ul>${topics.map(t => `<li>${t}</li>`).join('')}</ul>`;
  container.classList.remove('add');
}
